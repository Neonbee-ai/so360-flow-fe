name: Deploy Flow Frontend to Production

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}

      - name: Deploy to Production
        env:
          SERVER_IP: ${{ secrets.PROD_SERVER_IP }}
          BUILD_DIR: /github/neonbee/so360-flow-fe
          NGINX_ROOT: /var/www/cdn.neonbee.app/html/flow
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          ssh root@$SERVER_IP "mkdir -p '$BUILD_DIR' '$NGINX_ROOT'"

          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.git' \
            ./ "root@$SERVER_IP:$BUILD_DIR/"

          ssh root@$SERVER_IP "BUILD_DIR='$BUILD_DIR' NGINX_ROOT='$NGINX_ROOT' bash -s" << 'DEPLOY_SCRIPT'
            set -e
            cd "$BUILD_DIR"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22

            # Ensure shell packages are reachable for both ../  and ../../ file: paths
            ln -sfn /github/neonbee/so360-shell-fe /github/neonbee/so360-shell-fe 2>/dev/null || true
            ln -sfn /github/neonbee/so360-shell-fe /github/so360-shell-fe 2>/dev/null || true

            npm install --legacy-peer-deps

            printf '%s\n' \
              "VITE_BASE_URL=https://cdn.neonbee.app/flow/" \
              "VITE_SO360_CORE_API=https://api.neonbee.app/core" \
              "VITE_SO360_FLOW_API=https://api.neonbee.app/flow" \
              "VITE_ENVIRONMENT=cloud" \
              > .env

            npm run build

            rsync -a --delete dist/ "$NGINX_ROOT/"
            nginx -s reload
            echo "Deployed Flow to cdn.neonbee.app/flow"
          DEPLOY_SCRIPT
