name: Deploy Flow Frontend to Production

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: Neonbee-ai/neonbee-devops/.github/workflows/neonbee-deploy-prod.yml@main
    with:
      service_name: flow-fe
      deploy_type: vite-mfe
      nginx_root: /var/www/cdn.neonbee.app/html/flow
      needs_shell_packages: true
      is_shell: false
      cf_purge_urls: 'https://cdn.neonbee.app/flow/assets/remoteEntry.js,https://cdn.neonbee.app/flow/index.html'
      vite_env: |
        VITE_BASE_URL=https://cdn.neonbee.app/flow/
        VITE_SO360_CORE_API=https://api.neonbee.app/core
        VITE_SO360_FLOW_API=https://api.neonbee.app/flow
        VITE_ENVIRONMENT=cloud
    secrets: inherit
